<html>
    <head>
        <title>Five 7evens agency</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="header.css">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    </head>
    <body>
        
        <header class="page-header">
            <div class="myLogo">
                <img src="logo.png" alt="Five 7evens logo">
            </div>
            <nav class="nav-menu">
                <a href="#">Home</a>
                <a href="#destinations">Destination</a>
                <a href="#">Packages</a>
                <a href="#">Book</a>
            </nav>
        </header>
        <section class="welcome">
            <h2 align="center">Welcome to Five 7evens Agency!</h2>
            <h4 align="center">Your trusted partner for travelling around the globe!</h4> <br> <br> <br>
            <div class="search-bar" align="center">
                <input type="text" placeholder="Search for destinations" id="search-text">
                <button id="search-btn">Search</button>
            </div>
            <div class="dropdown">
            </div>
            <button id="show-all-destinations" align="center">Show all destinations</button>
        </section>



         <section class="destinations" id="destinations">
        <h2>Popular destinations</h2>

        <div id="card-template">
            <div id="dest-card">
                <div id="dest-icon"></div>
                <img class="dest-image" src="" alt="Destination" style="display: none;">
                <div id="dest-name"></div>
                <div id="dest-rating"></div>
                <div id="price-container">
                    <div id="dest-price"></div>
                    <button class="book-button">Book</button>
                </div>
            </div>

        </div>

        <div id="destinations-list">
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prev-btn" disabled>◀ Previous</button>
            <button class="nav-btn" id="next-btn">Next ▶</button>
        </div>
        <div class="counter" id="counter"></div>
    </section>
        

    </body>
