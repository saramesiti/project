<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packages</title>
    <link rel="stylesheet" href="packages.css">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <table id="package">
        <tr class="header_row">
            <th colspan="3" class="title">Packages</th>
        </tr>
        <tr class="first_row">
            <td class="paris"><!-- may change all classes of td to one name -->
                <img src="picture/Paris.jpg" alt="Paris package">
                <div>
                    <p class="place">Paris,France</p>
                    <button class="price" data-price="$899"></button>
                    <br>
                </div>
            </td>

            <td class="bali">
                <img src="picture/balii.jpg" alt="Bali package">
                <div>
                    <p class="place">Bali,Indonesia</p>
                    <button class="price" data-price="$699"></button>
                    <br>
                </div>
            </td>

            <td class="nyc">
                <img src="picture/NYC.jpg" alt="NYC package">
                <div>
                    <p class="place">New York,USA</p>
                    <button class="price" data-price="$799"></button>
                    <br>
                </div>
            </td>
              
        </tr class="second_row">
        
        <tr>
            <td class="tokyo">
                <img src="picture/tokyo.jpg" alt="Tokyo package">
                <div>
                    <p class="place">Tokyo,Japan</p>
                    <button class="price" data-price="$1099"></button>
                    <br>
                </div>
            </td>

            <td class="rome">
                <img src="picture/rome.jpg" alt="Rome package">
                <div>
                    <p class="place">Rome,Italy</p>
                    <button class="price" data-price="$849"></button>
                    <br>
                </div>
            </td>

            <td class="dubai">
                <img src="picture/dubai.jpg" alt="Dubai package">
                <div>
                    <p class="place">Dubai,UAE</p>
                    <button class="price" data-price="$999"></button>
                    <br>
                </div>
            </td>
        </tr>

    </table>
    
</body>
</html>
