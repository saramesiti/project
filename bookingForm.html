<html>
   <head>
    <title>Five 7evens Agency</title>
    <link rel="stylesheet" href="bookingForm.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="bookingForm.js"></script>
</head>

<body>
<section id="booking" class="booking">
    <div class="container">
        <h2 class="section-title">Book Your Adventure!</h2>
        
        <form id="booking-form">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="name" placeholder="Enter your name">
                <span class="error-message" id="name-error"></span>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="your@email.com">
                <span class="error-message" id="email-error"></span>
            </div>
            
            <div class="form-group">
                <label>Destination *</label>
                <select id="destination">
                    <option value="">Choose a destination</option>
                    <option value="paris">Paris, France</option>
                    <option value="bali">Bali, Indonesia</option>
                    <option value="nyc">New York, USA</option>
                    <option value="tokyo">Tokyo, Japan</option>
                </select>
                <span class="error-message" id="destination-error"></span>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Travel Date *</label>
                    <input type="date" id="date">
                    <span class="error-message" id="date-error"></span>
                </div>
                <div class="form-group">
                    <label>Guests *</label>
                    <input type="number" id="guests" min="1" max="20" value="1">
                    <span class="error-message" id="guests-error"></span>
                </div>
            </div>
            
            <button type="submit">Book Now →</button>
            <div id="form-message"></div>
            <div id="bookings-list"></div>
        </form>
        
        <!-- Simple display of last booking (optional) -->
        <div id="recent-booking"></div>
    </div>
</section>
</body>
</html>
